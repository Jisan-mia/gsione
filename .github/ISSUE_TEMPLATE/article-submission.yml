name: Article submission
description: Submit a new or updated GSi article without editing repository files manually.
title: "[Article] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for `content/articles/*.md`.

        - Choose whether you are creating a new article or updating an existing one.
        - Use **Custom article slug** only for new articles when you want to override the filename generated from the title.
        - Use **Existing article slug** only when you want to edit a file that already exists in `content/articles/`.
        - Add markdown images directly in the body, for example `![Alt text](https://...)`.
        - If you upload an image into the issue editor first, GitHub will give you a hosted image URL you can reuse in the article body.
        - After you submit, automation will open a draft pull request and add a rendered content preview to the issue.
  - type: dropdown
    id: submission-type
    attributes:
      label: Submission type
      options:
        - Create new content
        - Update existing content
      default: 0
    validations:
      required: true
  - type: input
    id: article-title
    attributes:
      label: Article title
      placeholder: The article headline
    validations:
      required: true
  - type: input
    id: custom-article-slug
    attributes:
      label: Custom article slug (optional)
      description: For new articles only. Leave blank to generate the filename from the title.
      placeholder: custom-article-slug
  - type: input
    id: existing-article-slug
    attributes:
      label: Existing article slug (for updates)
      description: Required only when you want to update an existing article file.
      placeholder: existing-article-slug
  - type: input
    id: category
    attributes:
      label: Category
      placeholder: Cybersecurity
    validations:
      required: true
  - type: input
    id: author-name
    attributes:
      label: Author name
      placeholder: Author Name
    validations:
      required: true
  - type: input
    id: author-role
    attributes:
      label: Author role
      placeholder: Researcher at GSi
    validations:
      required: true
  - type: textarea
    id: article-excerpt
    attributes:
      label: Article excerpt
      description: One short summary paragraph for cards and metadata.
      placeholder: Short summary for cards and metadata.
    validations:
      required: true
  - type: input
    id: publish-date
    attributes:
      label: Publish date (optional)
      description: Leave blank to use the issue date automatically.
      placeholder: YYYY-MM-DD
  - type: input
    id: source-label
    attributes:
      label: Source label (optional)
      placeholder: GSi LinkedIn
  - type: input
    id: source-url
    attributes:
      label: Source URL (optional)
      placeholder: https://example.com/post
  - type: dropdown
    id: featured
    attributes:
      label: Feature this article?
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true
  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Add one tag per line.
      placeholder: |
        Policy
        AI
        Governance
    validations:
      required: true
  - type: textarea
    id: article-body
    attributes:
      label: Article body
      description: Write the full article in Markdown, including image links if needed. A rendered preview will be added after submission.
      render: markdown
      placeholder: |
        # Article heading

        Write the article in markdown.
    validations:
      required: true
