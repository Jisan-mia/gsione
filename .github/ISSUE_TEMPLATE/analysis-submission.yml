name: Analysis submission
description: Submit a new or updated GSi analysis nugget without editing repository files manually.
title: "[Analysis] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for `content/analysis/*.md`.

        - Choose whether you are creating a new analysis post or updating an existing one.
        - Use **Custom analysis slug** only for new posts when you want to override the filename generated from the title.
        - Use **Existing analysis slug** only when you want to edit a file that already exists in `content/analysis/`.
        - Add markdown images directly in the body, for example `![Alt text](https://...)`.
        - After you submit, automation will open a draft pull request and add a rendered content preview to the issue.
  - type: dropdown
    id: submission-type
    attributes:
      label: Submission type
      options:
        - Create new content
        - Update existing content
      default: 0
    validations:
      required: true
  - type: input
    id: analysis-title
    attributes:
      label: Analysis title
      placeholder: The analysis headline
    validations:
      required: true
  - type: input
    id: custom-analysis-slug
    attributes:
      label: Custom analysis slug (optional)
      description: For new analysis only. Leave blank to generate the filename from the title.
      placeholder: custom-analysis-slug
  - type: input
    id: existing-analysis-slug
    attributes:
      label: Existing analysis slug (for updates)
      description: Required only when you want to update an existing analysis file.
      placeholder: existing-analysis-slug
  - type: input
    id: category
    attributes:
      label: Category
      placeholder: Cybersecurity
    validations:
      required: true
  - type: input
    id: author-name
    attributes:
      label: Author name
      placeholder: Author Name
    validations:
      required: true
  - type: input
    id: author-role
    attributes:
      label: Author role
      placeholder: Analyst at GSi
    validations:
      required: true
  - type: textarea
    id: analysis-excerpt
    attributes:
      label: Analysis excerpt
      description: One short summary paragraph for cards and metadata.
      placeholder: Short summary for cards and metadata.
    validations:
      required: true
  - type: input
    id: publish-date
    attributes:
      label: Publish date (optional)
      description: Leave blank to use the issue date automatically.
      placeholder: YYYY-MM-DD
  - type: input
    id: source-label
    attributes:
      label: Source label (optional)
      placeholder: GSi LinkedIn
  - type: input
    id: source-url
    attributes:
      label: Source URL (optional)
      placeholder: https://example.com/post
  - type: dropdown
    id: featured
    attributes:
      label: Feature this analysis?
      options:
        - "No"
        - "Yes"
      default: 0
    validations:
      required: true
  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Add one tag per line.
      placeholder: |
        Cybersecurity
        Bangladesh
        Governance
    validations:
      required: true
  - type: textarea
    id: analysis-body
    attributes:
      label: Analysis body
      description: Write the full analysis in Markdown. A rendered preview will be added after submission.
      render: markdown
      placeholder: |
        # Analysis heading

        Write the analysis in markdown.
    validations:
      required: true
