name: Content governance

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/*.mjs
      - .github/workflows/content-governance.yml
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
    paths:
      - content/**
      - scripts/*.mjs
      - .github/workflows/content-governance.yml
  pull_request_review:
    types:
      - submitted
      - dismissed

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: read

jobs:
  sync-labels:
    name: Sync editorial labels
    if: github.event_name != 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ensure workflow labels exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-content-labels.mjs

  manage-pr-labels:
    name: Update editorial PR labels
    if: github.event_name == 'pull_request_target' || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply PR state and section labels
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/manage-content-pr-labels.mjs
