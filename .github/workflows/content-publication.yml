name: Content publication state

on:
  workflow_run:
    workflows:
      - Deploy Next.js site to Pages
    types:
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  mark-published:
    name: Mark published content PRs
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Mark associated content PRs as published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/mark-content-published.mjs
