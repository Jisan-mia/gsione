name: Content submission intake

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: content-submission-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-content-pr:
    name: Create draft content PR
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Markdown content from the issue form
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/create-content-from-issue.mjs
